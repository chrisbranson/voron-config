[tmc2209 stepper_x]
uart_pin: PE1
interpolate: false  # More accurate positioning at the expense of louder operation
run_current: 1.2
sense_resistor: 0.110
stealthchop_threshold: 0

# https://www.klipper3d.org/TMC_Drivers.html?h=sensorless
# Sensorless homing
diag_pin: ^PG14     # Set to MCU pin connected to TMC DIAG pin
driver_SGTHRS: 110  # 255 is most sensitive value, 0 is least sensitive
home_current: 0.5
current_change_dwell_time: 0.2

[tmc2209 stepper_y]
uart_pin: PD3
interpolate: false  # More accurate positioning at the expense of louder operation
run_current: 1.2
sense_resistor: 0.110
stealthchop_threshold: 0

# Sensorless homing
diag_pin: ^PG15
driver_SGTHRS: 115
home_current: 0.5
current_change_dwell_time: 0.2

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: True
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: True
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: True
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: True
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0
